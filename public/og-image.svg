<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB"/>
      <stop offset="100%" style="stop-color:#FEF3C7"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <!-- Sun rays clip -->
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative bottom stripe -->
  <rect y="590" width="1200" height="40" fill="#D97706" opacity="0.15"/>

  <!-- Large decorative sun (top-right) -->
  <g transform="translate(1050, -80)">
    <!-- Sun circle -->
    <circle cx="0" cy="0" r="220" fill="#FCD34D" opacity="0.18"/>
    <circle cx="0" cy="0" r="160" fill="#FBBF24" opacity="0.22"/>
    <!-- Sun rays -->
    <g opacity="0.2" fill="#F59E0B">
      <rect x="-8" y="-300" width="16" height="80" rx="8"/>
      <rect x="-8" y="220" width="16" height="80" rx="8"/>
      <rect x="-300" y="-8" width="80" height="16" rx="8"/>
      <rect x="220" y="-8" width="80" height="16" rx="8"/>
      <rect transform="rotate(45)" x="-8" y="-300" width="16" height="80" rx="8"/>
      <rect transform="rotate(45)" x="-8" y="220" width="16" height="80" rx="8"/>
      <rect transform="rotate(45)" x="-300" y="-8" width="80" height="16" rx="8"/>
      <rect transform="rotate(45)" x="220" y="-8" width="80" height="16" rx="8"/>
    </g>
  </g>

  <!-- Sun icon (main) -->
  <g transform="translate(120, 200)">
    <circle cx="0" cy="0" r="64" fill="url(#sunGrad)"/>
    <!-- Rays -->
    <g stroke="#D97706" stroke-width="8" stroke-linecap="round">
      <line x1="0" y1="-82" x2="0" y2="-96"/>
      <line x1="0" y1="82" x2="0" y2="96"/>
      <line x1="-82" y1="0" x2="-96" y2="0"/>
      <line x1="82" y1="0" x2="96" y2="0"/>
      <line x1="-58" y1="-58" x2="-68" y2="-68"/>
      <line x1="58" y1="-58" x2="68" y2="-68"/>
      <line x1="-58" y1="58" x2="-68" y2="68"/>
      <line x1="58" y1="58" x2="68" y2="68"/>
    </g>
    <!-- Inner shine -->
    <circle cx="-18" cy="-18" r="16" fill="white" opacity="0.25"/>
  </g>

  <!-- SunBar wordmark -->
  <text x="220" y="170" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="#92400E" letter-spacing="-2">Sun</text>
  <text x="390" y="170" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="#D97706" letter-spacing="-2">Bar</text>

  <!-- Divider line -->
  <rect x="120" y="210" width="580" height="5" rx="2.5" fill="#D97706" opacity="0.4"/>

  <!-- Taglines -->
  <text x="120" y="285" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="600" fill="#78350F">Find sunny terraces near you — in real time</text>
  <text x="120" y="340" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#92400E" opacity="0.75">Encuentra terrazas al sol · Troba terrasses assolellades</text>

  <!-- Feature pills -->
  <g transform="translate(120, 390)">
    <!-- Pill 1 -->
    <rect width="210" height="52" rx="26" fill="#D97706" opacity="0.12"/>
    <text x="105" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#92400E" text-anchor="middle">☀️ Real-time sun</text>
    <!-- Pill 2 -->
    <rect x="228" width="198" height="52" rx="26" fill="#D97706" opacity="0.12"/>
    <text x="327" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#92400E" text-anchor="middle">📍 Any location</text>
    <!-- Pill 3 -->
    <rect x="444" width="188" height="52" rx="26" fill="#D97706" opacity="0.12"/>
    <text x="538" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#92400E" text-anchor="middle">🕐 Any time</text>
  </g>

  <!-- URL badge -->
  <rect x="120" y="516" width="240" height="48" rx="24" fill="#D97706"/>
  <text x="240" y="546" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">sunbbar.com</text>
</svg>
